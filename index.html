<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1" />
  <title>Rust Tetris</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --fg: #eee;
      --canvas-border: #444;
      --box-bg: #1e1e1e;
      --box-border: #444;
      --label-color: #888;
      --controls-color: #aaa;
      --controls-strong: #eee;
      --message-color: #fff;
      --message-bg: rgba(0,0,0,0.75);
      --grid-color: #222;
      --ghost-color: rgba(255,255,255,0.15);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f0f0f0;
        --fg: #111;
        --canvas-border: #bbb;
        --box-bg: #fff;
        --box-border: #ccc;
        --label-color: #666;
        --controls-color: #555;
        --controls-strong: #111;
        --message-color: #000;
        --message-bg: rgba(255,255,255,0.85);
        --grid-color: #ccc;
        --ghost-color: rgba(0,0,0,0.12);
      }
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100dvh;
      padding: 0.5rem 0.25rem;
      gap: 0.5rem;
      overflow-x: hidden;
    }

    h1 { font-size: 1.4rem; letter-spacing: 0.1em; }

    #wrapper {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }

    canvas {
      border: 2px solid var(--canvas-border);
      display: block;
      image-rendering: pixelated;
      touch-action: none;
    }

    #sidebar {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-width: 120px;
    }

    /* Mobile horizontal stats bar (hidden on desktop) */
    #stats-bar {
      display: none;
      gap: 0.5rem;
      width: 100%;
      justify-content: center;
    }

    #stats-bar .stat-box {
      flex: 1;
      text-align: center;
    }

    .stat-box {
      background: var(--box-bg);
      border: 1px solid var(--box-border);
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
    }

    .stat-label {
      font-size: 0.65rem;
      color: var(--label-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.2rem;
      margin-top: 0.1rem;
    }

    #controls {
      background: var(--box-bg);
      border: 1px solid var(--box-border);
      border-radius: 4px;
      padding: 0.6rem 1rem;
      font-size: 0.75rem;
      line-height: 1.8;
      color: var(--controls-color);
    }

    #controls strong {
      display: block;
      color: var(--controls-strong);
      margin-bottom: 0.3rem;
      font-size: 0.8rem;
    }

    #message {
      position: absolute;
      font-size: 1.2rem;
      color: var(--message-color);
      background: var(--message-bg);
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      display: none;
      text-align: center;
    }

    #board-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Touch control buttons (hidden on desktop) */
    #touch-controls {
      display: none;
      flex-direction: column;
      gap: 0.4rem;
      width: 100%;
      max-width: 320px;
      padding: 0 0.25rem;
    }

    .touch-row {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
    }

    .touch-btn {
      flex: 1;
      min-height: 52px;
      font-size: 1.1rem;
      background: var(--box-bg);
      color: var(--fg);
      border: 1px solid var(--box-border);
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      -webkit-tap-highlight-color: transparent;
    }

    .touch-btn:active {
      background: var(--canvas-border);
    }

    /* On narrow screens switch to mobile layout */
    @media (max-width: 600px) {
      h1 { font-size: 1.1rem; }

      #stats-bar { display: flex; }

      #wrapper { gap: 0; }

      #sidebar { display: none; }

      #touch-controls { display: flex; }
    }
  </style>
</head>
<body>
  <h1>🟦 Rust Tetris</h1>

  <!-- Mobile-only horizontal stats bar -->
  <div id="stats-bar">
    <div class="stat-box">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score-m">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Level</div>
      <div class="stat-value" id="level-m">1</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Lines</div>
      <div class="stat-value" id="lines-m">0</div>
    </div>
  </div>

  <div id="wrapper">
    <div id="board-container">
      <canvas id="canvas"></canvas>
      <div id="message"></div>
    </div>

    <div id="sidebar">
      <div class="stat-box">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Level</div>
        <div class="stat-value" id="level">1</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Lines</div>
        <div class="stat-value" id="lines">0</div>
      </div>

      <div id="controls">
        <strong>Controls</strong>
        ← / →   Move<br>
        ↑ / Z   Rotate<br>
        ↓       Soft drop<br>
        Space   Hard drop<br>
        P       Pause<br>
        Enter   New game
      </div>
    </div>
  </div>

  <!-- Mobile-only touch controls: only Pause and New Game; movement via board zones -->
  <div id="touch-controls">
    <div class="touch-row">
      <button class="touch-btn" id="btn-pause">⏸ <span>Pause</span></button>
      <button class="touch-btn" id="btn-new">↺ <span>New Game</span></button>
    </div>
  </div>

  <script type="module">
    import init, { WasmGame } from './pkg/rust_tetris.js';

    const COLS = 10;
    const ROWS = 20;
    let CELL = 30; // px per cell – recomputed on resize

    // ── Responsive cell-size calculation ────────────────────────────────────────

    const MIN_CELL_MOBILE  = 14; // smallest legible cell on a narrow phone
    const MIN_CELL_DESKTOP = 20; // minimum to keep the board usable on desktop
    const MAX_CELL_DESKTOP = 40; // cap so the board doesn't grow too large

    function computeCell() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      if (vw <= 600) {
        // Mobile vertical layout:
        //   h1 ~28px  + body-gap 8px
        //   + stats-bar ~50px + gap 8px
        //   + touch-controls: 1 row × (52px button + 0px gap) ≈ 52px + gap 8px
        //   + body padding 8px
        const reservedH = 28 + 8 + 50 + 8 + 52 + 8 + 8;
        const availH = vh - reservedH;
        const availW = vw - 8; // 4px body padding each side
        return Math.max(MIN_CELL_MOBILE, Math.min(Math.floor(availW / COLS), Math.floor(availH / ROWS)));
      } else {
        // Desktop horizontal layout:
        //   sidebar min-width 120px + gap 24px + body padding 16px
        //   h1 ~44px + gaps + body padding ~32px
        const reservedW = 120 + 24 + 16;
        const reservedH = 44 + 32;
        const availW = vw - reservedW;
        const availH = vh - reservedH;
        return Math.max(MIN_CELL_DESKTOP, Math.min(Math.floor(availW / COLS), Math.floor(availH / ROWS), MAX_CELL_DESKTOP));
      }
    }

    // ANSI-256 colour palette (subset used by the tetrominoes)
    // Maps colour index → CSS colour string
    const ANSI256 = (() => {
      const t = [];
      // Standard 16 (0-15) – only a rough approximation; tetrominoes use 16-231
      const base = [
        '#000000','#800000','#008000','#808000','#000080','#800080','#008080','#c0c0c0',
        '#808080','#ff0000','#00ff00','#ffff00','#0000ff','#ff00ff','#00ffff','#ffffff',
      ];
      for (let i = 0; i < 16; i++) t[i] = base[i];
      // 6×6×6 colour cube (16-231)
      const lvl = [0, 95, 135, 175, 215, 255];
      for (let r = 0; r < 6; r++)
        for (let g = 0; g < 6; g++)
          for (let b = 0; b < 6; b++)
            t[16 + r * 36 + g * 6 + b] =
              `rgb(${lvl[r]},${lvl[g]},${lvl[b]})`;
      // Greyscale ramp (232-255)
      for (let i = 0; i < 24; i++) {
        const v = 8 + i * 10;
        t[232 + i] = `rgb(${v},${v},${v})`;
      }
      return t;
    })();

    function getCSSVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const scoreEl  = document.getElementById('score');
    const levelEl  = document.getElementById('level');
    const linesEl  = document.getElementById('lines');
    const scoreMEl = document.getElementById('score-m');
    const levelMEl = document.getElementById('level-m');
    const linesMEl = document.getElementById('lines-m');
    const msgEl    = document.getElementById('message');

    function resizeCanvas() {
      CELL = computeCell();
      canvas.width  = COLS * CELL;
      canvas.height = ROWS * CELL;
      if (game) render();
    }

    let game = null;
    let tickTimer = null;
    let animFrame = null;

    function showMessage(text) {
      msgEl.textContent = text;
      msgEl.style.display = 'block';
    }

    function hideMessage() {
      msgEl.style.display = 'none';
    }

    // ── Touch zone constants ──────────────────────────────────────────────────────
    // Fraction of board width reserved for left/right move zones
    const SIDE_ZONE  = 0.35;
    // Fraction of board height reserved for the bottom drop zone
    const BOTTOM_ZONE = 0.28;

    function draw(board) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw subtle touch-zone hints on narrow screens
      if (window.innerWidth <= 600) {
        const bw = canvas.width;
        const bh = canvas.height;
        const sideW  = bw * SIDE_ZONE;
        const bottomH = bh * BOTTOM_ZONE;
        const topH   = bh - bottomH;
        ctx.save();

        // Left zone
        ctx.fillStyle = 'rgba(80,160,255,0.07)';
        ctx.fillRect(0, 0, sideW, topH);
        // Right zone
        ctx.fillStyle = 'rgba(80,160,255,0.07)';
        ctx.fillRect(bw - sideW, 0, sideW, topH);
        // Bottom drop zone
        ctx.fillStyle = 'rgba(255,180,60,0.07)';
        ctx.fillRect(0, topH, bw, bottomH);

        // Zone labels
        const labelSize = Math.max(10, Math.round(CELL * 0.55));
        ctx.font = `${labelSize}px monospace`;
        ctx.textBaseline = 'middle';
        ctx.globalAlpha = 0.22;
        ctx.fillStyle = getCSSVar('--fg');

        ctx.textAlign = 'center';
        ctx.fillText('◀', sideW / 2, topH / 2);
        ctx.fillText('▶', bw - sideW / 2, topH / 2);
        ctx.fillText('↻', bw / 2, topH / 2);
        ctx.fillText('▼  ▼▼', bw / 2, topH + bottomH / 2);

        ctx.restore();
      }

      // Draw grid
      ctx.strokeStyle = getCSSVar('--grid-color');
      ctx.lineWidth = 0.5;
      for (let c = 0; c <= COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(c * CELL, 0);
        ctx.lineTo(c * CELL, canvas.height);
        ctx.stroke();
      }
      for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * CELL);
        ctx.lineTo(canvas.width, r * CELL);
        ctx.stroke();
      }

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const v = board[r * COLS + c];
          if (v === 0) continue;
          const x = c * CELL;
          const y = r * CELL;
          if (v === 1) {
            // ghost piece
            ctx.fillStyle = getCSSVar('--ghost-color');
            ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
          } else {
            const color = ANSI256[v] ?? '#888';
            ctx.fillStyle = color;
            ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
            // simple highlight
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(x + 1, y + 1, CELL - 2, 4);
          }
        }
      }
    }

    function tick() {
      if (!game) return;
      const alive = game.tick();
      if (!alive) {
        clearInterval(tickTimer);
        tickTimer = null;
        showMessage('Game Over – Enter to restart');
        render();
        return;
      }
      render();
      // Re-schedule with updated interval (level may have changed)
      reschedule();
    }

    let currentInterval = 0;
    function reschedule() {
      if (!game) return;
      const ms = game.drop_interval_ms();
      if (ms !== currentInterval) {
        currentInterval = ms;
        clearInterval(tickTimer);
        tickTimer = setInterval(tick, ms);
      }
    }

    function render() {
      if (!game) return;
      draw(game.board_flat());
      const score = game.score();
      const level = game.level();
      const lines = game.lines_cleared();
      scoreEl.textContent  = score;
      levelEl.textContent  = level;
      linesEl.textContent  = lines;
      scoreMEl.textContent = score;
      levelMEl.textContent = level;
      linesMEl.textContent = lines;
    }

    function startGame() {
      if (tickTimer) clearInterval(tickTimer);
      game = new WasmGame();
      currentInterval = 0;
      hideMessage();
      render();
      reschedule();
    }

    // ── Keyboard controls ────────────────────────────────────────────────────────

    document.addEventListener('keydown', (e) => {
      if (!game) return;

      if (game.is_game_over()) {
        if (e.key === 'Enter') startGame();
        return;
      }

      switch (e.key) {
        case 'ArrowLeft':  e.preventDefault(); game.move_left();    break;
        case 'ArrowRight': e.preventDefault(); game.move_right();   break;
        case 'ArrowUp':
        case 'z':
        case 'Z':          e.preventDefault(); game.rotate();       break;
        case 'ArrowDown':  e.preventDefault(); game.soft_drop();    break;
        case ' ':          e.preventDefault(); game.hard_drop();    break;
        case 'p':
        case 'P':
          game.toggle_pause();
          if (game.is_paused()) {
            clearInterval(tickTimer);
            tickTimer = null;
            showMessage('Paused – P to resume');
          } else {
            hideMessage();
            reschedule();
          }
          break;
        case 'Enter':
          startGame();
          return;
      }
      render();
    });

    // ── Touch controls on the board (zone-based) ─────────────────────────────────

    let touchStartX = 0;
    let touchStartY = 0;
    const TAP_MAX_DIST = 18; // px – larger movement is not treated as a tap

    // Double-tap detection for hard drop (bottom zone)
    let lastBottomTapTime = 0;
    let bottomTapTimer    = null;
    const DOUBLE_TAP_MS   = 280;

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (!game || game.is_game_over() || game.is_paused()) return;

      const touch = e.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;

      // Ignore swipes – only act on taps
      if (Math.sqrt(dx * dx + dy * dy) > TAP_MAX_DIST) return;

      const rect = canvas.getBoundingClientRect();
      const relX = (touch.clientX - rect.left) / rect.width;
      const relY = (touch.clientY - rect.top)  / rect.height;

      if (relY >= 1 - BOTTOM_ZONE) {
        // Bottom zone: single tap = soft drop, double tap = hard drop
        const now = Date.now();
        if (now - lastBottomTapTime < DOUBLE_TAP_MS) {
          // Second tap within window → hard drop
          clearTimeout(bottomTapTimer);
          bottomTapTimer    = null;
          lastBottomTapTime = 0;
          game.hard_drop();
          render();
        } else {
          // First tap: wait to see if a second arrives before acting
          lastBottomTapTime = now;
          bottomTapTimer = setTimeout(() => {
            bottomTapTimer    = null;
            lastBottomTapTime = 0;
            if (game && !game.is_game_over() && !game.is_paused()) {
              game.soft_drop();
              render();
            }
          }, DOUBLE_TAP_MS);
        }
      } else if (relX < SIDE_ZONE) {
        game.move_left();
        render();
      } else if (relX > 1 - SIDE_ZONE) {
        game.move_right();
        render();
      } else {
        // Centre strip → rotate
        game.rotate();
        render();
      }
    }, { passive: false });

    // ── On-screen touch button wiring (Pause / New Game only) ───────────────────

    document.getElementById('btn-pause').addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (!game) return;
      game.toggle_pause();
      if (game.is_paused()) {
        clearInterval(tickTimer);
        tickTimer = null;
        showMessage('Paused – tap ⏸ to resume');
      } else {
        hideMessage();
        reschedule();
      }
    }, { passive: false });

    document.getElementById('btn-new').addEventListener('touchstart', (e) => {
      e.preventDefault();
      startGame();
    }, { passive: false });

    // ── Resize handler ───────────────────────────────────────────────────────────

    window.addEventListener('resize', resizeCanvas);

    // ── Init ─────────────────────────────────────────────────────────────────────

    await init();
    resizeCanvas();
    startGame();
  </script>
</body>
</html>
