<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rust Tetris</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --fg: #eee;
      --canvas-border: #444;
      --box-bg: #1e1e1e;
      --box-border: #444;
      --label-color: #888;
      --controls-color: #aaa;
      --controls-strong: #eee;
      --message-color: #fff;
      --message-bg: rgba(0,0,0,0.75);
      --grid-color: #222;
      --ghost-color: rgba(255,255,255,0.15);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f0f0f0;
        --fg: #111;
        --canvas-border: #bbb;
        --box-bg: #fff;
        --box-border: #ccc;
        --label-color: #666;
        --controls-color: #555;
        --controls-strong: #111;
        --message-color: #000;
        --message-bg: rgba(255,255,255,0.85);
        --grid-color: #ccc;
        --ghost-color: rgba(0,0,0,0.12);
      }
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
    }

    h1 { font-size: 1.8rem; letter-spacing: 0.1em; }

    #wrapper {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }

    canvas {
      border: 2px solid var(--canvas-border);
      display: block;
      image-rendering: pixelated;
    }

    #sidebar {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-width: 130px;
    }

    .stat-box {
      background: var(--box-bg);
      border: 1px solid var(--box-border);
      padding: 0.6rem 1rem;
      border-radius: 4px;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--label-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.4rem;
      margin-top: 0.2rem;
    }

    #controls {
      background: var(--box-bg);
      border: 1px solid var(--box-border);
      border-radius: 4px;
      padding: 0.6rem 1rem;
      font-size: 0.75rem;
      line-height: 1.8;
      color: var(--controls-color);
    }

    #controls strong {
      display: block;
      color: var(--controls-strong);
      margin-bottom: 0.3rem;
      font-size: 0.8rem;
    }

    #message {
      position: absolute;
      font-size: 1.4rem;
      color: var(--message-color);
      background: var(--message-bg);
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      display: none;
    }

    #board-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <h1>🟦 Rust Tetris</h1>

  <div id="wrapper">
    <div id="board-container">
      <canvas id="canvas"></canvas>
      <div id="message"></div>
    </div>

    <div id="sidebar">
      <div class="stat-box">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Level</div>
        <div class="stat-value" id="level">1</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Lines</div>
        <div class="stat-value" id="lines">0</div>
      </div>

      <div id="controls">
        <strong>Controls</strong>
        ← / → Move<br>
        ↑ / Z  Rotate<br>
        ↓      Soft drop<br>
        Space  Hard drop<br>
        P      Pause<br>
        Enter  New game
      </div>
    </div>
  </div>

  <script type="module">
    import init, { WasmGame } from './pkg/rust_tetris.js';

    const COLS = 10;
    const ROWS = 20;
    const CELL = 30; // px per cell

    // ANSI-256 colour palette (subset used by the tetrominoes)
    // Maps colour index → CSS colour string
    const ANSI256 = (() => {
      const t = [];
      // Standard 16 (0-15) – only a rough approximation; tetrominoes use 16-231
      const base = [
        '#000000','#800000','#008000','#808000','#000080','#800080','#008080','#c0c0c0',
        '#808080','#ff0000','#00ff00','#ffff00','#0000ff','#ff00ff','#00ffff','#ffffff',
      ];
      for (let i = 0; i < 16; i++) t[i] = base[i];
      // 6×6×6 colour cube (16-231)
      const lvl = [0, 95, 135, 175, 215, 255];
      for (let r = 0; r < 6; r++)
        for (let g = 0; g < 6; g++)
          for (let b = 0; b < 6; b++)
            t[16 + r * 36 + g * 6 + b] =
              `rgb(${lvl[r]},${lvl[g]},${lvl[b]})`;
      // Greyscale ramp (232-255)
      for (let i = 0; i < 24; i++) {
        const v = 8 + i * 10;
        t[232 + i] = `rgb(${v},${v},${v})`;
      }
      return t;
    })();

    function getCSSVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width  = COLS * CELL;
    canvas.height = ROWS * CELL;

    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const linesEl = document.getElementById('lines');
    const msgEl   = document.getElementById('message');

    let game = null;
    let tickTimer = null;
    let animFrame = null;

    function showMessage(text) {
      msgEl.textContent = text;
      msgEl.style.display = 'block';
    }

    function hideMessage() {
      msgEl.style.display = 'none';
    }

    function draw(board) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Draw grid
      ctx.strokeStyle = getCSSVar('--grid-color');
      ctx.lineWidth = 0.5;
      for (let c = 0; c <= COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(c * CELL, 0);
        ctx.lineTo(c * CELL, canvas.height);
        ctx.stroke();
      }
      for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * CELL);
        ctx.lineTo(canvas.width, r * CELL);
        ctx.stroke();
      }

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const v = board[r * COLS + c];
          if (v === 0) continue;
          const x = c * CELL;
          const y = r * CELL;
          if (v === 1) {
            // ghost piece
            ctx.fillStyle = getCSSVar('--ghost-color');
            ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
          } else {
            const color = ANSI256[v] ?? '#888';
            ctx.fillStyle = color;
            ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
            // simple highlight
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(x + 1, y + 1, CELL - 2, 4);
          }
        }
      }
    }

    function tick() {
      if (!game) return;
      const alive = game.tick();
      if (!alive) {
        clearInterval(tickTimer);
        tickTimer = null;
        showMessage('Game Over – Enter to restart');
        render();
        return;
      }
      render();
      // Re-schedule with updated interval (level may have changed)
      reschedule();
    }

    let currentInterval = 0;
    function reschedule() {
      if (!game) return;
      const ms = game.drop_interval_ms();
      if (ms !== currentInterval) {
        currentInterval = ms;
        clearInterval(tickTimer);
        tickTimer = setInterval(tick, ms);
      }
    }

    function render() {
      if (!game) return;
      draw(game.board_flat());
      scoreEl.textContent = game.score();
      levelEl.textContent = game.level();
      linesEl.textContent = game.lines_cleared();
    }

    function startGame() {
      if (tickTimer) clearInterval(tickTimer);
      game = new WasmGame();
      currentInterval = 0;
      hideMessage();
      render();
      reschedule();
    }

    document.addEventListener('keydown', (e) => {
      if (!game) return;

      if (game.is_game_over()) {
        if (e.key === 'Enter') startGame();
        return;
      }

      switch (e.key) {
        case 'ArrowLeft':  e.preventDefault(); game.move_left();    break;
        case 'ArrowRight': e.preventDefault(); game.move_right();   break;
        case 'ArrowUp':
        case 'z':
        case 'Z':          e.preventDefault(); game.rotate();       break;
        case 'ArrowDown':  e.preventDefault(); game.soft_drop();    break;
        case ' ':          e.preventDefault(); game.hard_drop();    break;
        case 'p':
        case 'P':
          game.toggle_pause();
          if (game.is_paused()) {
            clearInterval(tickTimer);
            tickTimer = null;
            showMessage('Paused – P to resume');
          } else {
            hideMessage();
            reschedule();
          }
          break;
        case 'Enter':
          startGame();
          return;
      }
      render();
    });

    await init();
    startGame();
  </script>
</body>
</html>
